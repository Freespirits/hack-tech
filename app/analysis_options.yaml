include: package:flutter_lints/flutter.yaml

# Lints kept light on purpose. The defaults from `flutter_lints` already
# cover the safety-critical rules; piling on `strict-casts`,
# `strict-inference`, and `strict-raw-types` was breaking `flutter
# analyze` on legitimate JSON-decoding sites where the dynamic shape is
# the API. Re-enable per-package later if the team wants stricter typing.

analyzer:
  errors:
    invalid_annotation_target: ignore
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"

linter:
  rules:
    - prefer_single_quotes
    - prefer_final_locals
    - unawaited_futures
    - avoid_print
    - directives_ordering
