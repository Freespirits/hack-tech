name: petvitals
description: Vet-clinic-grade companion for the SINOHERO/BerryMed AM4100 monitor.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State + DI
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # BLE — flutter_blue_plus is actively maintained and far more reliable than
  # flutter_reactive_ble (which is what the stock Berry Pet Health app uses
  # and is a major source of its background-disconnect issues).
  flutter_blue_plus: ^1.32.12
  flutter_foreground_task: ^8.4.0
  permission_handler: ^11.3.1

  # Local DB
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # Backend
  supabase_flutter: ^2.5.6
  http: ^1.2.1
  dio: ^5.4.3+1

  # UI
  fl_chart: ^0.68.0
  just_audio: ^0.9.38
  intl: ^0.19.0
  go_router: ^14.1.4
  flutter_svg: ^2.0.10+1

  # Misc
  collection: ^1.18.0
  meta: ^1.12.0
  uuid: ^4.4.0
  logger: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/sounds/alarm.wav
    - assets/sounds/heart.wav
