name: Flutter CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.22.x

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift sources
        run: dart run build_runner build --delete-conflicting-outputs
        continue-on-error: false

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test --coverage

      - name: Upload coverage
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: app/coverage/lcov.info
          retention-days: 7

  apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.22.x

      - name: Install dependencies
        run: flutter pub get

      - name: Patch flutter_blue_plus_android for AGP 8 compatibility
        # See app/tool/patch_flutter_blue_plus.sh for the rationale —
        # the upstream plugin's `compileSdkVersion = flutter.compileSdkVersion`
        # line crashes Gradle 8 / AGP 8 configuration. Idempotent.
        run: bash tool/patch_flutter_blue_plus.sh

      - name: Generate Drift sources
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build release APK
        # Default build dimension. Build flavors / signed releases plug
        # in here later.
        run: |
          flutter build apk --release \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL || 'https://placeholder.supabase.co' }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY || 'placeholder' }}

      - name: Build per-ABI split APKs
        # `--split-per-abi` produces three smaller APKs (armeabi-v7a,
        # arm64-v8a, x86_64). Each is ~10–11 MB vs ~28 MB for the
        # universal one — handy for QA on bandwidth-constrained
        # devices.
        run: |
          flutter build apk --release --split-per-abi \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL || 'https://placeholder.supabase.co' }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY || 'placeholder' }}

      - name: Upload universal APK
        uses: actions/upload-artifact@v4
        with:
          name: petvitals-universal-apk
          path: app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload per-ABI APKs
        uses: actions/upload-artifact@v4
        with:
          name: petvitals-split-apks
          path: app/build/app/outputs/flutter-apk/app-*-release.apk
          retention-days: 30
