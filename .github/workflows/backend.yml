name: Backend CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  prompts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.45.x

      - name: Lint Edge Functions
        run: deno lint supabase/functions

      - name: Format check
        run: deno fmt --check supabase/functions tests

      - name: Run prompt-cache prefix tests
        run: deno task --config tests/deno.json test tests/

  schema:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Apply migrations
        env:
          PGPASSWORD: postgres
        run: |
          # We can't apply Supabase migrations exactly because they
          # depend on the `auth` schema. Strip the auth-table FK
          # references for a syntax check; the policies are exercised
          # in supabase functions test elsewhere.
          for f in supabase/migrations/*.sql; do
            echo "checking $f"
            sed 's/references auth.users(id) on delete cascade//; s/references auth.users(id) on delete set null//' "$f" \
              | psql -h localhost -U postgres -v ON_ERROR_STOP=1
          done
